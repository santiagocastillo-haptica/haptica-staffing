<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staffing - Presupuesto · Háptica</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f4f6f8; color: #1a2e35; min-height: 100vh; }

    /* ── Header ─────────────────────────────────── */
    .header {
      background: #003237; padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .header-left h1 { color: #fff; font-size: 18px; font-weight: 700; }
    .header-left .subtitle { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-chip {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 99px; padding: 4px 12px 4px 4px;
    }
    .user-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: #FA4616; color: #fff; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .user-email { color: rgba(255,255,255,0.85); font-size: 12px; font-weight: 500; }
    .btn-nav {
      display: inline-flex; align-items: center; gap: 5px;
      color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500;
      text-decoration: none; border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 12px; border-radius: 7px; transition: all 0.15s;
      cursor: pointer; background: transparent; font-family: inherit;
    }
    .btn-nav:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

    /* ── Login ───────────────────────────────────── */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 70px);
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px 48px;
      text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 360px; width: 100%;
    }
    .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .login-card p { font-size: 13px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .btn-google {
      display: inline-flex; align-items: center; gap: 10px;
      background: #fff; border: 1.5px solid #d4dfe2; border-radius: 8px;
      padding: 10px 20px; font-family: inherit; font-size: 14px; font-weight: 600;
      color: #1a2e35; cursor: pointer; transition: all 0.15s; width: 100%; justify-content: center;
    }
    .btn-google:hover { border-color: #003237; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    .access-denied {
      color: #dc2626; font-size: 13px; margin-top: 12px;
      background: #fee2e2; border-radius: 8px; padding: 10px 14px; display: none;
    }

    /* ── App ─────────────────────────────────────── */
    #app { display: none; }
    .content { padding: 20px 24px 48px; }

    /* ── Toolbar ─────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .changes-badge {
      font-size: 12px; font-weight: 600; color: #92400e;
      background: #fef3c7; border: 1px solid #fde68a;
      padding: 4px 10px; border-radius: 99px; display: none;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      background: #003237; color: #fff; border: none; padding: 8px 18px;
      border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary:hover { background: #004a50; }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff; color: #1a2e35; border: 1.5px solid #d4dfe2;
      padding: 7px 14px; border-radius: 8px; font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: #003237; color: #003237; }
    .update-notice {
      display: inline-flex; align-items: center; gap: 6px;
      background: #e8f4f5; border: 1px solid #c2dfe2; color: #003237;
      font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 99px;
    }
    .update-notice::before { content: '🕐'; font-size: 12px; }

    /* ── Matrix table wrapper ────────────────────── */
    .matrix-wrap {
      overflow-x: auto; border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* ── Matrix table ────────────────────────────── */
    .matrix {
      border-collapse: collapse; font-size: 12px;
      background: #fff; min-width: 100%;
    }

    /* Sticky first column */
    .matrix .col-name {
      position: sticky; left: 0; z-index: 2;
      background: #fff; min-width: 180px; max-width: 200px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .matrix thead .col-name { background: #1a2e35; z-index: 3; }

    /* ── Header rows ─────────────────────────────── */
    .matrix thead tr th {
      padding: 0; text-align: center;
      font-weight: 600; white-space: nowrap;
    }
    /* Row 1: Month */
    .row-month th {
      background: #1a2e35; color: rgba(255,255,255,0.7);
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; padding: 7px 4px; border-right: 1px solid #2d4350;
    }
    .row-month th.col-name { color: rgba(255,255,255,0.4); font-size: 10px; }
    /* Row 2: Date range */
    .row-dates th {
      background: #243b44; color: rgba(255,255,255,0.5);
      font-size: 10px; font-weight: 500; padding: 4px 4px;
      border-right: 1px solid #2d4350;
    }
    /* Row 3: Week number */
    .row-weeks th {
      background: #1a2e35; color: #fff;
      font-size: 13px; font-weight: 800; padding: 6px 4px;
      border-right: 1px solid #2d4350; min-width: 52px;
    }
    /* Row 4: Capacity % */
    .row-cap th {
      background: #f0f4f5; color: #5a7a82;
      font-size: 11px; font-weight: 600; padding: 5px 4px;
      border-right: 1px solid #e2e8ea; border-bottom: 2px solid #d4dfe2;
    }
    .row-cap th.col-name { text-align: left; padding-left: 12px; color: #9ca3af; font-size: 10px; }

    /* ── Body rows ───────────────────────────────── */
    /* Haptiqueño header row */
    .row-person td {
      background: #eef6f7; font-weight: 700; font-size: 12px;
      color: #003237; padding: 7px 4px; border-bottom: 1px solid #d4dfe2;
      text-align: center;
    }
    .row-person td.col-name {
      text-align: left; padding-left: 12px; font-size: 13px;
      border-right: 2px solid #003237;
    }
    /* Project row */
    .row-project td {
      background: #fff; padding: 2px 4px;
      border-bottom: 1px solid #f0f4f5;
      border-right: 1px solid #f0f4f5;
      text-align: center;
    }
    .row-project td.col-name {
      text-align: left; padding-left: 22px; font-size: 12px;
      color: #374151; font-weight: 500;
      border-right: 2px solid #003237;
    }
    .row-project:hover td { background: #f8fbfc; }
    .row-project:hover td.col-name { background: #f8fbfc; }
    /* Add row button row */
    .row-add td {
      background: #fff; padding: 4px;
      border-bottom: 2px solid #eef2f4;
    }
    .row-add td.col-name {
      border-right: 2px solid #003237;
    }
    .btn-add-row {
      background: none; border: none; cursor: pointer;
      color: #9ca3af; font-size: 11px; font-weight: 500;
      padding: 4px 12px; font-family: inherit; transition: color 0.15s;
    }
    .btn-add-row:hover { color: #003237; }

    /* ── Hours input ─────────────────────────────── */
    .hrs-input {
      width: 44px; padding: 4px 2px; border: 1.5px solid transparent;
      border-radius: 5px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: #1a2e35; text-align: center; background: transparent;
      transition: all 0.12s;
    }
    .hrs-input:hover { border-color: #d4dfe2; background: #fff; }
    .hrs-input:focus { outline: none; border-color: #003237; background: #fff; }
    .hrs-input.changed { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
    .hrs-input::-webkit-inner-spin-button,
    .hrs-input::-webkit-outer-spin-button { opacity: 0.4; }

    /* ── % cells coloring ────────────────────────── */
    .pct-cell { font-size: 11px; font-weight: 700; }
    .pct-low    { color: #059669; }
    .pct-ok     { color: #003237; }
    .pct-warn   { color: #d97706; }
    .pct-over   { color: #dc2626; background: #fee2e2 !important; border-radius: 4px; padding: 1px 4px; }

    /* ── Saving / Toast ──────────────────────────── */
    .saving-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,50,55,0.7); z-index: 200;
      align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    }
    .saving-overlay.open { display: flex; }
    .saving-overlay .spinner {
      width: 36px; height: 36px; border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .saving-overlay p { color: #fff; font-size: 14px; font-weight: 600; }
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: #1a2e35; color: #fff;
      padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2); transform: translateY(60px); opacity: 0;
      transition: all 0.3s; z-index: 300;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #065f46; }
    .toast.error   { background: #991b1b; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 26px 30px;
      width: 380px; max-width: 95vw; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
    .modal-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .modal-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #5a7a82; }
    .modal-field input, .modal-field select {
      padding: 8px 11px; border: 1.5px solid #d4dfe2; border-radius: 7px;
      font-family: inherit; font-size: 13px; font-weight: 500; color: #1a2e35; background: #fff;
    }
    .modal-field input:focus, .modal-field select:focus { outline: none; border-color: #003237; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    .state-msg { text-align: center; padding: 60px 0; color: #5a7a82; font-size: 14px; }
    .state-msg .spinner {
      width: 30px; height: 30px; border: 3px solid #d4dfe2;
      border-top-color: #003237; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 14px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Staffing - Presupuesto</h1>
    <div class="subtitle">Asignación de horas presupuestadas por proyecto y haptiqueño</div>
  </div>
  <div class="header-right" id="headerRight">
    <a class="btn-nav" href="index.html">← Dashboard</a>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-screen">
    <div class="login-card">
      <h2>Acceso restringido</h2>
      <p>Esta herramienta está disponible solo para el equipo de dirección de Háptica.</p>
      <button class="btn-google" id="btnLogin">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Iniciar sesión con Google
      </button>
      <div class="access-denied" id="accessDenied"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="content">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="update-notice" id="updateNotice">Cargando datos…</div>
        <span class="changes-badge" id="changesBadge"></span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" id="btnDiscard" onclick="discardChanges()" style="display:none">Descartar</button>
        <button class="btn-primary" id="btnSave" onclick="saveChanges()" disabled>💾 Guardar cambios</button>
      </div>
    </div>
    <div id="matrixContainer">
      <div class="state-msg"><div class="spinner"></div>Cargando…</div>
    </div>
  </div>
</div>

<!-- Modal nueva fila -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Agregar proyecto a <span id="modalPersonName"></span></h3>
    <div class="modal-field">
      <label>Proyecto</label>
      <input type="text" id="modalProyecto" placeholder="Ej: TELMEX-02" autocomplete="off" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="confirmNewRow()">Agregar</button>
    </div>
  </div>
</div>

<div class="saving-overlay" id="savingOverlay"><div class="spinner"></div><p>Guardando…</p></div>
<div class="toast" id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────
const CLIENT_ID      = '662265278503-9lnnh14m6gle9aus0tuvhv3n556tu99j.apps.googleusercontent.com';
const SPREADSHEET_ID = '1fPL_GZfRAH_Jz8hHfvZtPEpxf1dAlJ-8W8JOBgsTw18';
const SHEET_DATA     = 'Dashboard_Data';
const SHEET_CONFIG   = 'Config_Cargabilidad';
const SCOPES         = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email';
const AUTHORIZED     = ['santiago.castillo@haptica.co', 'mariacamila@haptica.co'];

const NOMBRE_MAP = {
  'A. Roa':'Ana Roa','C. Niño':'Camilo Niño',
  'J. Rodríguez':'Jhojann Rodríguez','Jhojann Rodriguez':'Jhojann Rodríguez',
  'Natalia Rodriguez':'Natalia Rodríguez',
};
const PROJECT_FIXED = ['ADM-01','ADM-02','COM','OPS'];

// ── State ─────────────────────────────────────────────────────────────────
let gapiReady   = false;
let tokenClient = null;
let currentUser = null;
let sheetRows   = [];   // raw rows from sheet
let headers     = [];
let colIdx      = {};
let configMap   = {};   // semana → { festivos, tardes_libres }
// matrix[colaborador][proyecto][semana] = { hours, rowIndex (1-based, null if new) }
let matrix      = {};
let dirtyMatrix = {}; // same shape, only changed cells
let modalPerson = null;
let weekRange   = [];  // sorted list of week numbers to display

// ── Auth ──────────────────────────────────────────────────────────────────
function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.load('https://sheets.googleapis.com/$discovery/rest?version=v4');
    gapiReady = true;
  });
}
function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: handleToken,
  });
}
function handleToken(resp) {
  if (resp.error) return;
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: `Bearer ${resp.access_token}` }
  }).then(r => r.json()).then(info => {
    const email = (info.email || '').toLowerCase();
    if (!AUTHORIZED.map(e => e.toLowerCase()).includes(email)) {
      const el = document.getElementById('accessDenied');
      el.style.display = 'block';
      el.textContent = `⛔ Sin acceso: ${info.email || 'cuenta desconocida'}`;
      google.accounts.oauth2.revoke(resp.access_token);
      return;
    }
    currentUser = info.email;
    gapi.client.setToken({ access_token: resp.access_token });
    const ini = currentUser.split('.').map(p => p[0].toUpperCase()).join('').slice(0,2);
    document.getElementById('headerRight').innerHTML = `
      <div class="user-chip">
        <div class="user-avatar">${ini}</div>
        <span class="user-email">${currentUser}</span>
      </div>
      <a class="btn-nav" href="index.html">← Dashboard</a>`;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  });
}
document.getElementById('btnLogin').addEventListener('click', () => {
  if (!gapiReady) { showToast('Cargando bibliotecas…'); return; }
  tokenClient.requestAccessToken({ prompt: '' });
});

// ── Load data ─────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('matrixContainer').innerHTML =
    '<div class="state-msg"><div class="spinner"></div>Cargando datos…</div>';
  try {
    let cfgRes = { result: { values: [] } };
    try {
      cfgRes = await Promise.resolve(gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID, range: SHEET_CONFIG
      }));
    } catch(e) { /* Config tab optional */ }

    const dataRes = await Promise.resolve(gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: SPREADSHEET_ID, range: SHEET_DATA
    }));

    // Parse config
    const cfgRows = cfgRes.result.values || [];
    if (cfgRows.length > 1) {
      const cfgH = cfgRows[0].map(h => h.trim().toLowerCase());
      cfgRows.slice(1).forEach(r => {
        const sem = Number(r[cfgH.indexOf('semana')]);
        if (sem) configMap[sem] = {
          festivos:      Number(r[cfgH.indexOf('festivos')])      || 0,
          tardes_libres: Number(r[cfgH.indexOf('tardes_libres')]) || 0,
        };
      });
    }

    // Parse data
    const rows = dataRes.result.values || [];
    if (!rows.length) throw new Error('Sheet vacío');
    headers = rows[0].map(h => h.trim().toLowerCase());
    headers.forEach((h, i) => { colIdx[h] = i; });

    sheetRows = rows.slice(1).map((r, i) => {
      const obj = { _row: i + 2 };
      headers.forEach((h, j) => { obj[h] = r[j] ?? ''; });
      if (obj.colaborador && NOMBRE_MAP[obj.colaborador]) obj.colaborador = NOMBRE_MAP[obj.colaborador];
      obj.semana = Number(obj.semana) || null;
      obj.horaspresupuestadas = Number(obj.horaspresupuestadas) || 0;
      return obj;
    }).filter(r => r.semana && r.colaborador);

    buildMatrix();
    buildWeekRange();
    renderMatrix();
    updateTimestamp();

  } catch(err) {
    console.error(err);
    document.getElementById('matrixContainer').innerHTML =
      `<div class="state-msg">⚠️ Error al cargar datos.<br><small>${err.message}</small></div>`;
  }
}

function buildMatrix() {
  matrix = {};
  sheetRows.forEach(r => {
    const col  = r.colaborador;
    const proy = r.proyecto || '—';
    const sem  = r.semana;
    if (!matrix[col]) matrix[col] = {};
    if (!matrix[col][proy]) matrix[col][proy] = {};
    matrix[col][proy][sem] = { hours: r.horaspresupuestadas, rowIndex: r._row };
  });
}

function buildWeekRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  const curWeek = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);

  const existingWeeks = [...new Set(sheetRows.map(r => r.semana))];
  const minW = existingWeeks.length ? Math.min(...existingWeeks) : curWeek - 4;
  const maxW = Math.max(curWeek + 8, existingWeeks.length ? Math.max(...existingWeeks) : curWeek + 8);

  weekRange = [];
  for (let w = minW; w <= maxW; w++) weekRange.push(w);
}

// ── Week helpers ──────────────────────────────────────────────────────────
function getWeekMonday(week, year) {
  // ISO week: find Jan 4th (always in week 1), then offset
  const jan4 = new Date(year, 0, 4);
  const jan4Day = jan4.getDay() || 7; // Mon=1..Sun=7
  const week1Mon = new Date(jan4);
  week1Mon.setDate(jan4.getDate() - jan4Day + 1);
  const mon = new Date(week1Mon);
  mon.setDate(week1Mon.getDate() + (week - 1) * 7);
  return mon;
}

function weekDateLabel(week) {
  // Try to determine year from context (weeks > 52 don't exist, handle year boundary)
  const now = new Date();
  let year = now.getFullYear();
  // Heuristic: if week <= 26 and current month > 6, it's likely next year
  if (week <= 26 && now.getMonth() >= 6) year += 1;
  if (week >= 40 && now.getMonth() <= 2) year -= 1;

  const mon = getWeekMonday(week, year);
  const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  const fmt = d => d.getDate();
  return `${fmt(mon)}-${fmt(fri)}`;
}

function weekMonthYear(week) {
  const now = new Date();
  let year = now.getFullYear();
  if (week <= 26 && now.getMonth() >= 6) year += 1;
  if (week >= 40 && now.getMonth() <= 2) year -= 1;
  const mon = getWeekMonday(week, year);
  return { month: mon.getMonth(), year: mon.getFullYear() };
}

const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                   'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function capPct(sem) {
  const cfg = configMap[sem] || {};
  const cap = 40 - (cfg.festivos || 0) * 8 - (cfg.tardes_libres || 0) * 4;
  return Math.min(cap, 40) / 40;
}

function pctClass(pct) {
  if (pct === null || pct === undefined) return '';
  if (pct > 1.05) return 'pct-over';
  if (pct > 0.9)  return 'pct-warn';
  if (pct > 0)    return 'pct-ok';
  return 'pct-low';
}

function fmtPct(p) { return p !== null ? Math.round(p * 100) + '%' : ''; }

// ── Render matrix ─────────────────────────────────────────────────────────
function renderMatrix() {
  dirtyMatrix = {};
  updateDirtyUI();

  // Build month groups for header
  const monthGroups = [];
  weekRange.forEach(w => {
    const { month, year } = weekMonthYear(w);
    const key = `${year}-${month}`;
    if (!monthGroups.length || monthGroups[monthGroups.length-1].key !== key) {
      monthGroups.push({ key, label: MONTHS_ES[month], count: 1 });
    } else {
      monthGroups[monthGroups.length-1].count++;
    }
  });

  const curWeekNow = (() => {
    const now = new Date();
    const s = new Date(now.getFullYear(), 0, 1);
    return Math.ceil(((now - s) / 86400000 + s.getDay() + 1) / 7);
  })();

  // ── THEAD ──
  let thead = '<thead>';

  // Row 1: months
  thead += '<tr class="row-month">';
  thead += '<th class="col-name"></th>';
  monthGroups.forEach(g => {
    thead += `<th colspan="${g.count}">${g.label}</th>`;
  });
  thead += '</tr>';

  // Row 2: date ranges
  thead += '<tr class="row-dates">';
  thead += '<th class="col-name"></th>';
  weekRange.forEach(w => { thead += `<th>${weekDateLabel(w)}</th>`; });
  thead += '</tr>';

  // Row 3: week numbers
  thead += '<tr class="row-weeks">';
  thead += '<th class="col-name"></th>';
  weekRange.forEach(w => {
    const isCur = w === curWeekNow;
    thead += `<th style="${isCur ? 'background:#FA4616;color:#fff' : ''}">${w}</th>`;
  });
  thead += '</tr>';

  // Row 4: capacity %
  thead += '<tr class="row-cap">';
  thead += '<th class="col-name">Capacidad equipo</th>';
  weekRange.forEach(w => {
    const pct = capPct(w);
    const cls = pctClass(pct);
    thead += `<th><span class="pct-cell ${cls}">${fmtPct(pct)}</span></th>`;
  });
  thead += '</tr>';

  thead += '</thead>';

  // ── TBODY ──
  const colaboradores = Object.keys(matrix).sort();
  let tbody = '<tbody>';

  colaboradores.forEach(col => {
    // Person header row with % per week
    tbody += `<tr class="row-person">`;
    tbody += `<td class="col-name">${col}</td>`;
    weekRange.forEach(w => {
      const totalHrs = Object.values(matrix[col]).reduce((sum, proy) => {
        const cell = (dirtyMatrix[col] && dirtyMatrix[col][proy] && dirtyMatrix[col][proy][w] !== undefined)
          ? dirtyMatrix[col][proy][w].hours
          : (matrix[col][proy] && matrix[col][proy][w] ? matrix[col][proy][w].hours : 0);
        return sum + cell;
      }, 0);
      const cap = 40 * capPct(w);
      const pct = cap > 0 ? totalHrs / cap : (totalHrs > 0 ? 1 : null);
      const cls = pctClass(pct);
      const isCur = w === curWeekNow;
      tbody += `<td style="${isCur ? 'background:#fff3ee' : ''}">
        ${totalHrs > 0 ? `<span class="pct-cell ${cls}">${fmtPct(pct)}</span>` : ''}
      </td>`;
    });
    tbody += '</tr>';

    // Project rows
    const proyectos = sortProjects(Object.keys(matrix[col]));
    proyectos.forEach(proy => {
      tbody += `<tr class="row-project" data-col="${escAttr(col)}" data-proy="${escAttr(proy)}">`;
      tbody += `<td class="col-name">${proy}</td>`;
      weekRange.forEach(w => {
        const existing = matrix[col][proy][w];
        const dirty    = dirtyMatrix[col] && dirtyMatrix[col][proy] && dirtyMatrix[col][proy][w] !== undefined;
        const val      = dirty ? dirtyMatrix[col][proy][w].hours : (existing ? existing.hours : 0);
        const isCur    = w === curWeekNow;
        const changed  = dirty ? 'changed' : '';
        tbody += `<td style="${isCur ? 'background:#fffaf8' : ''}">
          <input class="hrs-input ${changed}" type="number" min="0" step="0.5"
            value="${val || ''}" placeholder=""
            data-col="${escAttr(col)}" data-proy="${escAttr(proy)}" data-week="${w}"
            data-rowindex="${existing ? existing.rowIndex : ''}"
            onchange="onCellChange(this)" />
        </td>`;
      });
      tbody += '</tr>';
    });

    // Add row button
    tbody += `<tr class="row-add">
      <td class="col-name">
        <button class="btn-add-row" onclick="openModal('${escAttr(col)}')">＋ agregar proyecto</button>
      </td>
      ${weekRange.map(() => '<td></td>').join('')}
    </tr>`;
  });

  tbody += '</tbody>';

  document.getElementById('matrixContainer').innerHTML = `
    <div class="matrix-wrap">
      <table class="matrix">${thead}${tbody}</table>
    </div>`;
}

function sortProjects(proyNames) {
  const fixed = PROJECT_FIXED.map(p => proyNames.find(n => n === p)).filter(Boolean);
  const rest  = proyNames.filter(n => !PROJECT_FIXED.includes(n)).sort();
  return [...fixed, ...rest];
}
function escAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

// ── Cell change ───────────────────────────────────────────────────────────
function onCellChange(input) {
  const col  = input.dataset.col;
  const proy = input.dataset.proy;
  const week = Number(input.dataset.week);
  const rowI = input.dataset.rowindex ? Number(input.dataset.rowindex) : null;
  const newV = Number(input.value) || 0;
  const orig = matrix[col] && matrix[col][proy] && matrix[col][proy][week]
    ? matrix[col][proy][week].hours : 0;

  if (!dirtyMatrix[col]) dirtyMatrix[col] = {};
  if (!dirtyMatrix[col][proy]) dirtyMatrix[col][proy] = {};

  if (newV === orig) {
    delete dirtyMatrix[col][proy][week];
    input.classList.remove('changed');
  } else {
    dirtyMatrix[col][proy][week] = { hours: newV, rowIndex: rowI, isNew: !rowI };
    input.classList.add('changed');
  }

  refreshPersonRow(col);
  updateDirtyUI();
}

function refreshPersonRow(col) {
  // Recalc % cells in the person header row
  const personRow = document.querySelector(`.row-person td.col-name`);
  // Quick approach: re-render just the % cells
  const rows = document.querySelectorAll(`.row-project[data-col="${escAttr(col)}"]`);
  const inputs = [];
  rows.forEach(r => r.querySelectorAll('.hrs-input').forEach(i => inputs.push(i)));

  const byWeek = {};
  inputs.forEach(inp => {
    const w = Number(inp.dataset.week);
    byWeek[w] = (byWeek[w] || 0) + (Number(inp.value) || 0);
  });

  const personRows = document.querySelectorAll('.row-person');
  personRows.forEach(pr => {
    const nameCell = pr.querySelector('.col-name');
    if (!nameCell || nameCell.textContent.trim() !== col) return;
    const cells = pr.querySelectorAll('td:not(.col-name)');
    cells.forEach((cell, i) => {
      const w   = weekRange[i];
      const hrs = byWeek[w] || 0;
      const cap = 40 * capPct(w);
      const pct = cap > 0 ? hrs / cap : (hrs > 0 ? 1 : null);
      const cls = pctClass(pct);
      cell.innerHTML = hrs > 0 ? `<span class="pct-cell ${cls}">${fmtPct(pct)}</span>` : '';
    });
  });
}

function updateDirtyUI() {
  let count = 0;
  Object.values(dirtyMatrix).forEach(p =>
    Object.values(p).forEach(w => count += Object.keys(w).length)
  );
  const badge = document.getElementById('changesBadge');
  badge.textContent = `${count} cambio${count !== 1 ? 's' : ''} sin guardar`;
  badge.style.display = count > 0 ? 'inline-block' : 'none';
  document.getElementById('btnSave').disabled    = count === 0;
  document.getElementById('btnDiscard').style.display = count > 0 ? 'inline-flex' : 'none';
}

function discardChanges() {
  dirtyMatrix = {};
  renderMatrix();
}

// ── Save ──────────────────────────────────────────────────────────────────
async function saveChanges() {
  const updateData = [];
  const newRows    = [];
  const now        = new Date().toISOString();
  const presCol    = colIdx['horaspresupuestadas'] ?? colIdx['horas_presupuestadas'];
  const tsColI     = Object.keys(colIdx).findIndex(k => k.includes('actualizacion') || k.includes('update'));

  Object.entries(dirtyMatrix).forEach(([col, proyMap]) => {
    Object.entries(proyMap).forEach(([proy, weekMap]) => {
      Object.entries(weekMap).forEach(([week, cell]) => {
        if (cell.isNew || !cell.rowIndex) {
          newRows.push({ semana: Number(week), colaborador: col, proyecto: proy, horas: cell.hours });
        } else {
          const presLetter = colToLetter(presCol);
          updateData.push({ range: `${SHEET_DATA}!${presLetter}${cell.rowIndex}`, values: [[cell.hours]] });
          if (tsColI >= 0) {
            updateData.push({ range: `${SHEET_DATA}!${colToLetter(tsColI)}${cell.rowIndex}`, values: [[now]] });
          }
        }
      });
    });
  });

  document.getElementById('savingOverlay').classList.add('open');
  try {
    if (updateData.length) {
      await gapi.client.sheets.spreadsheets.values.batchUpdate({
        spreadsheetId: SPREADSHEET_ID,
        resource: { valueInputOption: 'RAW', data: updateData },
      });
    }
    if (newRows.length) {
      const appendData = newRows.map(r => {
        const row = new Array(headers.length).fill('');
        row[colIdx['semana']] = r.semana;
        row[colIdx['colaborador']] = r.colaborador;
        row[colIdx['proyecto']] = r.proyecto;
        if (presCol !== undefined) row[presCol] = r.horas;
        if (tsColI >= 0) row[tsColI] = now;
        return row;
      });
      await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: SPREADSHEET_ID, range: `${SHEET_DATA}!A1`,
        valueInputOption: 'RAW', insertDataOption: 'INSERT_ROWS',
        resource: { values: appendData },
      });
    }
    document.getElementById('savingOverlay').classList.remove('open');
    showToast('✓ Guardado correctamente', 'success');
    await loadData();
  } catch(err) {
    console.error(err);
    document.getElementById('savingOverlay').classList.remove('open');
    showToast('⚠️ Error al guardar: ' + err.message, 'error');
  }
}

function colToLetter(idx) {
  let l = '', n = idx;
  do { l = String.fromCharCode(65 + (n % 26)) + l; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return l;
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(col) {
  modalPerson = col;
  document.getElementById('modalPersonName').textContent = col;
  document.getElementById('modalProyecto').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function confirmNewRow() {
  const proy = document.getElementById('modalProyecto').value.trim();
  if (!proy) { alert('Ingresa un nombre de proyecto.'); return; }
  if (matrix[modalPerson] && matrix[modalPerson][proy]) {
    alert(`${modalPerson} ya tiene el proyecto ${proy}.`); return;
  }
  if (!matrix[modalPerson]) matrix[modalPerson] = {};
  matrix[modalPerson][proy] = {};
  closeModal();
  renderMatrix();
}

// ── Timestamp ─────────────────────────────────────────────────────────────
function updateTimestamp() {
  const tsKey = Object.keys(colIdx).find(k => k.includes('actualizacion') || k.includes('update'));
  let d = null;
  if (tsKey) {
    const dates = sheetRows.map(r => r[tsKey]).filter(Boolean);
    if (dates.length) {
      const latest = dates.reduce((a, b) => a > b ? a : b);
      const p = new Date(latest);
      if (!isNaN(p) && p.getFullYear() >= 2020) d = p;
    }
  }
  if (!d) d = new Date();
  document.getElementById('updateNotice').textContent =
    `Datos al ${d.toLocaleString('es-CL', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}`;
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  setTimeout(() => { el.className = 'toast'; }, 3500);
}
